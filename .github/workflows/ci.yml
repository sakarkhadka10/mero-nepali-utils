name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing"
            exit 1
          fi

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: build

    # only run on main push (not PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate docs
        run: npm run docs

      - name: Deploy to GitHub Pages
        run: |
          npm install -g gh-pages
          gh-pages -d docs